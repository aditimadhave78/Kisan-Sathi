 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kisan Sathi - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f7f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      width: 380px;
    }
    h2 { color: #2e7d32; text-align: center; margin-bottom: 24px; }
    .logo { text-align: center; font-size: 2.5rem; margin-bottom: 8px; }
    input {
      width: 100%; padding: 12px; margin: 8px 0;
      border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem;
    }
    input:focus { outline: none; border-color: #2e7d32; }
    button {
      width: 100%; padding: 13px; background: #2e7d32;
      color: white; border: none; border-radius: 6px;
      font-size: 1rem; cursor: pointer; margin-top: 10px;
    }
    button:hover { background: #1b5e20; }
    .msg { text-align: center; margin-top: 12px; font-size: 0.9rem; }
    .msg.success { color: green; }
    .msg.error { color: red; }
    .signup-link {
      text-align: center; margin-top: 16px;
      font-size: 0.9rem; color: #555;
    }
    .signup-link a { color: #2e7d32; text-decoration: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🌱</div>
    <h2>Kisan Sathi</h2>

    <input type="email"    id="email"    placeholder="Email Address" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">Login Karo</button>
    <div class="msg" id="msg"></div>
    <div class="signup-link">
      Naya account? <a href="signup.html">Register Karo</a>
    </div>
  </div>

  <script>
    async function login() {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      if (!email || !password) {
        document.getElementById('msg').innerHTML = '⚠️ Email aur password bharo!';
        document.getElementById('msg').className = 'msg error';
        return;
      }

      const res = await fetch('http://localhost:3000/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      const msgDiv = document.getElementById('msg');

      if (data.success) {
        // Token aur farmer info save karo
        localStorage.setItem('token', data.token);
        localStorage.setItem('farmer', JSON.stringify(data.farmer));

        msgDiv.innerHTML = '✅ Login successful!';
        msgDiv.className = 'msg success';
        setTimeout(() => window.location.href = 'dashboard.html', 1000);
      } else {
        msgDiv.innerHTML = '❌ ' + data.message;
        msgDiv.className = 'msg error';
      }
    }
  </script>
</body>
</html>
