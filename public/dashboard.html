 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kisan Sathi - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f7f0; }
    nav {
      background: #2e7d32; color: white;
      padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    nav h1 { font-size: 1.3rem; }
    nav span { font-size: 0.9rem; opacity: 0.9; }
    nav button {
      background: white; color: #2e7d32;
      border: none; padding: 7px 16px;
      border-radius: 5px; cursor: pointer; font-weight: bold;
    }
    .main { max-width: 1000px; margin: 30px auto; padding: 0 16px; }
    .welcome {
      background: white; border-radius: 10px;
      padding: 20px 24px; margin-bottom: 24px;
      border-left: 5px solid #2e7d32;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .welcome h2 { color: #2e7d32; font-size: 1.4rem; }
    .welcome p { color: #666; margin-top: 4px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card {
      background: white; border-radius: 10px;
      padding: 22px; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .card h3 {
      color: #2e7d32; margin-bottom: 16px;
      font-size: 1.1rem; border-bottom: 2px solid #e8f5e9; padding-bottom: 8px;
    }
    .card input, .card select {
      width: 100%; padding: 10px; margin: 6px 0;
      border: 1px solid #ccc; border-radius: 6px; font-size: 0.9rem;
    }
    .card input:focus, .card select:focus { outline: none; border-color: #2e7d32; }
    .btn-green {
      width: 100%; padding: 11px; background: #2e7d32;
      color: white; border: none; border-radius: 6px;
      font-size: 0.95rem; cursor: pointer; margin-top: 8px;
    }
    .btn-green:hover { background: #1b5e20; }
    .small-msg { font-size: 0.85rem; margin-top: 8px; text-align: center; }
    .small-msg.success { color: green; }
    .small-msg.error { color: red; }
    .crop-item {
      background: #f1f8e9; border-radius: 8px;
      padding: 12px 14px; margin-bottom: 10px;
      border-left: 4px solid #66bb6a;
    }
    .crop-item h4 { color: #2e7d32; font-size: 1rem; }
    .crop-item p { color: #666; font-size: 0.82rem; margin-top: 3px; }
    .no-crops { color: #999; font-size: 0.9rem; text-align: center; padding: 20px 0; }
    .market-filter { display: flex; gap: 8px; margin-bottom: 12px; }
    .market-filter input, .market-filter select {
      flex: 1; padding: 9px; border: 1px solid #ccc;
      border-radius: 6px; font-size: 0.88rem;
    }
    .market-filter button {
      padding: 9px 16px; background: #2e7d32; color: white;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem;
    }
    .price-item {
      background: #f9fbe7; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .price-item .crop-name { font-weight: bold; color: #333; font-size: 0.9rem; }
    .price-item .market-name { color: #777; font-size: 0.78rem; margin-top: 2px; }
    .price-item .price { color: #2e7d32; font-weight: bold; font-size: 1rem; }
    .price-item .price span { font-size: 0.75rem; color: #999; display: block; text-align: right; }
    .loading { color: #999; text-align: center; padding: 16px; font-size: 0.9rem; }
    @media(max-width: 650px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav>
  <h1>🌱 Kisan Sathi</h1>
  <span id="nav-name">Swagat hai!</span>
  <button onclick="logout()">Logout</button>
</nav>

<div class="main">
  <div class="welcome">
    <h2 id="welcome-msg">Namaste! 👋</h2>
    <p id="welcome-loc">Tumhara dashboard ready hai.</p>
  </div>

  <div class="grid">
    <div class="card">
      <h3>🌾 Nayi Fasal Add Karo</h3>
      <input type="text"   id="crop-name"    placeholder="Fasal ka naam (e.g. Wheat)" />
      <input type="number" id="crop-area"    placeholder="Zameen (acres mein)" />
      <select id="crop-season">
        <option value="">-- Season Chuniye --</option>
        <option>Kharif</option>
        <option>Rabi</option>
        <option>Zaid</option>
      </select>
      <input type="date" id="crop-date" />
      <button class="btn-green" onclick="addCrop()">Fasal Add Karo</button>
      <div class="small-msg" id="crop-msg"></div>
    </div>

    <div class="card">
      <h3>📋 Meri Fasalein</h3>
      <div id="crops-list"><div class="loading">Loading...</div></div>
    </div>

    <div class="card" style="grid-column: 1 / -1;">
      <h3>💰 Real Time Mandi Bhav</h3>
      <div class="market-filter">
        <select id="market-state">
          <option value="Maharashtra">Maharashtra</option>
          <option value="Punjab">Punjab</option>
          <option value="Rajasthan">Rajasthan</option>
          <option value="Uttar Pradesh">Uttar Pradesh</option>
          <option value="Madhya Pradesh">Madhya Pradesh</option>
          <option value="Gujarat">Gujarat</option>
          <option value="Karnataka">Karnataka</option>
          <option value="Haryana">Haryana</option>
        </select>
        <input type="text" id="market-crop" placeholder="Fasal ka naam (optional)" />
        <button onclick="loadPrices()">Bhav Dekho</button>
      </div>
      <div id="prices-list"><div class="loading">State chuniye aur Bhav Dekho click karo</div></div>
    </div>
  </div>
</div>

<script>
  var token = localStorage.getItem('token');
  var farmer = {};
  try { farmer = JSON.parse(localStorage.getItem('farmer') || '{}'); } catch(e) {}

  if (!token) {
    alert('Pehle login karo!');
    window.location.href = 'login.html';
  }

  document.getElementById('nav-name').textContent    = farmer.name || 'Kisan';
  document.getElementById('welcome-msg').textContent = 'Namaste, ' + (farmer.name || 'Kisan') + '! 👋';
  document.getElementById('welcome-loc').textContent = 'Location: ' + (farmer.location || 'N/A');

  function loadCrops() {
    var div = document.getElementById('crops-list');
    div.innerHTML = '<div class="loading">Loading...</div>';

    fetch('http://localhost:3000/api/crops/my-crops', {
      headers: { 'authorization': token }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (!data.crops || data.crops.length === 0) {
        div.innerHTML = '<div class="no-crops">Abhi koi fasal nahi. Upar se add karo!</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < data.crops.length; i++) {
        var c = data.crops[i];
        var date = c.sowing_date ? c.sowing_date.split('T')[0] : 'N/A';
        html += '<div class="crop-item">';
        html += '<h4>🌿 ' + c.name + '</h4>';
        html += '<p>📐 ' + c.land_area + ' acres | 🗓️ ' + c.season + ' | 🌱 ' + date + '</p>';
        html += '</div>';
      }
      div.innerHTML = html;
    })
    .catch(function() {
      document.getElementById('crops-list').innerHTML = '<div class="no-crops">❌ Error loading crops</div>';
    });
  }

  function addCrop() {
    var name        = document.getElementById('crop-name').value;
    var land_area   = document.getElementById('crop-area').value;
    var season      = document.getElementById('crop-season').value;
    var sowing_date = document.getElementById('crop-date').value;
    var msgDiv      = document.getElementById('crop-msg');

    if (!name || !land_area || !season) {
      msgDiv.textContent = '⚠️ Saari fields bharo!';
      msgDiv.className   = 'small-msg error';
      return;
    }

    fetch('http://localhost:3000/api/crops/add', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'authorization': token
      },
      body: JSON.stringify({
        name: name,
        land_area: land_area,
        season: season,
        sowing_date: sowing_date
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.success) {
        msgDiv.textContent = '✅ Fasal add ho gayi!';
        msgDiv.className   = 'small-msg success';
        document.getElementById('crop-name').value   = '';
        document.getElementById('crop-area').value   = '';
        document.getElementById('crop-season').value = '';
        document.getElementById('crop-date').value   = '';
        loadCrops();
      } else {
        msgDiv.textContent = '❌ ' + data.message;
        msgDiv.className   = 'small-msg error';
      }
    })
    .catch(function() {
      msgDiv.textContent = '❌ Server se connect nahi hua';
      msgDiv.className   = 'small-msg error';
    });
  }

  function loadPrices() {
    var state = document.getElementById('market-state').value;
    var crop  = document.getElementById('market-crop').value;
    var div   = document.getElementById('prices-list');

    div.innerHTML = '<div class="loading">⏳ Prices load ho rahi hain...</div>';

    fetch('http://localhost:3000/api/market/prices?state=' + state + '&crop=' + crop)
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (!data.success || !data.prices || data.prices.length === 0) {
        div.innerHTML = '<div class="loading">❌ Prices nahi mili.</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < data.prices.length; i++) {
        var p = data.prices[i];
        html += '<div class="price-item">';
        html += '<div>';
        html += '<div class="crop-name">🌾 ' + p.crop + '</div>';
        html += '<div class="market-name">📍 ' + p.market + ', ' + p.state + ' — ' + p.date + '</div>';
        html += '</div>';
        html += '<div class="price">₹' + p.modalPrice;
        html += '<span>Min: ₹' + p.minPrice + ' | Max: ₹' + p.maxPrice + '</span>';
        html += '</div></div>';
      }
      div.innerHTML = html;
    })
    .catch(function() {
      div.innerHTML = '<div class="loading">❌ Server error</div>';
    });
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }

  loadCrops();
</script>
</body>
</html>
